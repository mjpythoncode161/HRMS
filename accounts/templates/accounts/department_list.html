{% include 'accounts/header.html' %} {% include 'accounts/topbar.html' %}
{%include 'accounts/sidebar.html' %}

<div class="content-wrapper">
  <!-- Content Header -->
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Department List</h1>
        </div>
      </div>
    </div>
  </section>

  <!-- Main content -->
  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-12">
          <div class="card card-outline card-primary">
            <!-- Card Header -->
            <div class="card-header">
              <div class="card-tools">
                <a
                  href="{% url 'department_add' %}"
                  class="btn btn-sm btn-primary"
                >
                  <i class="fas fa-plus"></i> Add New
                </a>
              </div>
            </div>

            <!-- Card Body -->
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-bordered table-hover">
                  <thead class="text-center">
                    <tr>
                      <th style="width: 10%">SI NO</th>
                      <th>Name</th>
                      <th style="width: 15%">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    {% for i in form %}
                    <tr>
                      <td class="text-center"><b>{{ forloop.counter }}</b></td>
                      <td class="text-center"><b>{{ i.dept_name }}</b></td>
                      <td class="text-center">
                        <div class="btn-group btn-group-sm">
                          <a
                            href="{% url 'department_edit' i.id %}"
                            class="btn btn-primary"
                          >
                            <i class="fas fa-edit"></i>
                          </a>
                          <a
                            href="{% url 'department_delete' i.id %}"
                            class="btn btn-danger"
                            onclick="
                              return confirm(
                                'Are you sure you want to delete this department?',
                              );
                            "
                          >
                            <i class="fas fa-trash"></i>
                          </a>
                        </div>
                      </td>
                    </tr>
                    {% empty %}
                    <tr>
                      <td colspan="3" class="text-center text-muted">
                        No records found
                      </td>
                    </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<style>
  table td {
    vertical-align: middle !important;
  }
</style>
