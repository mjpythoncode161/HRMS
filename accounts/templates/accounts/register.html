{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ system_name }} | Registration</title>

    <!-- Google Font: Source Sans Pro -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="{% static 'assets/assets/plugins/fontawesome-free/css/all.min.css' %}"
    />
    <!-- icheck bootstrap -->
    <link
      rel="stylesheet"
      href="{% static 'assets/assets/plugins/icheck-bootstrap/icheck-bootstrap.min.css' %}"
    />
    <!-- Theme style -->
    <link
      rel="stylesheet"
      href="{% static 'assets/assets/dist/css/adminlte.min.css' %}"
    />
  </head>
  <body class="hold-transition register-page">
    <div class="register-box">
      <div class="card card-outline card-primary">
        <div class="card-header text-center">
          {% if company_logo_url %}
          <img src="{{ company_logo_url }}" alt="Logo" style="max-height: 56px; margin-bottom: 8px;" />
          {% endif %}
          <a href="{% url 'login' %}" class="h1"><b>{{ system_name }}</b></a>
        </div>
        <div class="card-body">
          <p class="login-box-msg">Register a new membership</p>

          {% if messages %} {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible">
            <button
              type="button"
              class="close"
              data-dismiss="alert"
              aria-hidden="true"
            >
              &times;
            </button>
            {{ message }}
          </div>
          {% endfor %} {% endif %}

          <form action="{% url 'register' %}" method="post">
            {% csrf_token %}
            <div class="input-group mb-3">
              <input
                type="text"
                name="full_name"
                class="form-control"
                placeholder="Full Name"
                required
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-user"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="tel"
                name="phone"
                class="form-control"
                placeholder="Phone No"
                pattern="[0-9]{10}"
                maxlength="10"
                minlength="10"
                title="Please enter exactly 10 digits"
                required
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-phone"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Email"
                required
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-envelope"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-lock"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="date"
                name="dob"
                class="form-control"
                placeholder="Date of Birth"
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-calendar"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <select name="gender" class="form-control">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-venus-mars"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="text"
                name="father_name"
                class="form-control"
                placeholder="Father's Name"
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-user-tie"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <textarea
                name="address"
                class="form-control"
                placeholder="Address"
                rows="2"
              ></textarea>
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-home"></span>
                </div>
              </div>
            </div>
            <div class="input-group mb-3">
              <input
                type="tel"
                name="emergency_contact"
                class="form-control"
                placeholder="Emergency Contact"
                pattern="[0-9]{10}"
                maxlength="10"
                minlength="10"
                title="Please enter exactly 10 digits"
              />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-phone-alt"></span>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-8">
                <div class="icheck-primary">
                  <input
                    type="checkbox"
                    id="agreeTerms"
                    name="terms"
                    value="agree"
                  />
                  <label for="agreeTerms">
                    I agree to the <a href="#">terms</a>
                  </label>
                </div>
              </div>
              <div class="col-4">
                <button type="submit" class="btn btn-primary btn-block">
                  Register
                </button>
              </div>
            </div>
          </form>

          <a href="{% url 'login' %}" class="text-center"
            >I already have a membership</a
          >
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="{% static 'assets/assets/plugins/jquery/jquery.min.js' %}"></script>
    <!-- Bootstrap 4 -->
    <script src="{% static 'assets/assets/plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <!-- AdminLTE App -->
    <script src="{% static 'assets/assets/dist/js/adminlte.min.js' %}"></script>
  </body>
</html>
