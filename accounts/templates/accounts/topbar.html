{% load static %}

<!-- Navbar -->
<nav class="main-header navbar navbar-expand navbar-primary navbar-dark">
  <!-- Left navbar -->
  <ul class="navbar-nav">
    <!-- Sidebar Toggle -->
    <li class="nav-item">
      <a class="nav-link" data-widget="pushmenu" href="#" role="button">
        <i class="fas fa-bars"></i>
      </a>
    </li>

    <!-- System Name -->
    <li class="nav-item d-none d-sm-inline-block">
      <a href="{% url 'home' %}" class="nav-link text-white">
        <strong>{{ system_name|default:"Dashboard" }}</strong>
      </a>
    </li>
  </ul>

  <!-- Right navbar -->
  <ul class="navbar-nav ml-auto">
    <!-- Fullscreen -->
    <li class="nav-item">
      <a class="nav-link" data-widget="fullscreen" href="#" role="button">
        <i class="fas fa-expand-arrows-alt"></i>
      </a>
    </li>

    <!-- User Dropdown -->
    <li class="nav-item dropdown">
      <a class="nav-link" data-toggle="dropdown" href="#">
        <div class="d-flex align-items-center">
          <i class="fa fa-user mr-2"></i>
          <strong>
            {% if request.user.first_name %}{{ request.user.first_name }} 
            {%else%}User{% endif %}</strong
          >
          <i class="fa fa-angle-down ml-2"></i>
        </div>
      </a>

      <div class="dropdown-menu dropdown-menu-right">
        <a class="dropdown-item" href="{% url 'manage_account' %}">
          <i class="fa fa-cog mr-2"></i> Manage Account
        </a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item text-danger" href="{% url 'logout' %}">
          <i class="fa fa-power-off mr-2"></i> Logout
        </a>
      </div>
    </li>
  </ul>
</nav>
<!-- /.navbar -->
