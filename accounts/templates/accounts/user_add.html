{% include 'accounts/header.html' %} {% include 'accounts/topbar.html' %}
{%include 'accounts/sidebar.html' %}

<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Add User</h1>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-12">
          <div class="card card-outline card-primary">
            <div class="card-header">
              <h3 class="card-title text-primary">User</h3>
            </div>
            <div class="card-body">
              <form method="POST" action="{% url 'user_add' %}">
                {% csrf_token %}
                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">Full Name</label>
                      <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        placeholder="Enter full name"
                        required
                      />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">Contact No.</label>
                      <input
                        type="text"
                        name="phone"
                        class="form-control"
                        placeholder="Enter contact number"
                        pattern="[0-9]{10}"
                        maxlength="10"
                        minlength="10"
                        required
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">Email ID</label>
                      <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter email ID"
                        required
                      />
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">Password</label>
                      <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">Departments</label>
                      <select name="department" class="form-control">
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">
                          {{ dept.dept_name }}
                        </option>
                        {% empty %}
                        <option value="">No departments available</option>
                        {% endfor %}
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label class="text-primary">User Type</label>
                      <select name="type" class="form-control" required>
                        <option value="1">Admin</option>
                        <option value="2" selected>Employee</option>
                        <option value="3">Account</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="text-center mt-4">
                  <button type="submit" class="btn btn-primary">Submit</button>
                  <a href="{% url 'user_list' %}" class="btn btn-secondary"
                    >Close</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

{% include 'accounts/footer.html' %}
